<h1>My Invoices</h1>
<div class="card-container">
  <mat-card
    appearance="outlined"
    class="invoice-card"
    *ngFor="let invoice of invoices; let index = index"
    (click)="navigateToPage('account/' + (index + 1))"
  >
    <mat-card-header>
      <mat-card-title>{{ invoice.name }}</mat-card-title>
    </mat-card-header>
    <mat-icon class="card-icon" matListItemIcon>article</mat-icon>
    <mat-card-content>
      <p>{{ invoice.updated | date }}</p>
    </mat-card-content>
  </mat-card>
</div>
