<h1 class="page-title">My Account</h1>
<h2 class="sub-heading">All Invoices</h2>
<div class="toolbar">
  <mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Car wash" #input />
</mat-form-field>
<button class="create-button" mat-flat-button (click)="navigateToPage('account/create-invoice')"><mat-icon>add</mat-icon>New Invoice</button>
</div>

<!-- Icon Column -->
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="icon">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      <mat-icon matListItemIcon>description</mat-icon>
    </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td
      mat-cell
      *matCellDef="let element"
      class="clickable-row"
      (click)="navigateToPage('account/' + element.id)"
    >
      {{ element.name }}
    </td>
  </ng-container>

  <!-- Updated Column -->
  <ng-container matColumnDef="updated">
    <th mat-header-cell *matHeaderCellDef>Updated</th>
    <td mat-cell *matCellDef="let element">{{ element.updated | date }}</td>
  </ng-container>

  <!-- Options Column -->
  <ng-container matColumnDef="options">
    <th mat-header-cell *matHeaderCellDef>Options</th>
    <td mat-cell *matCellDef="let element">
      <div style="display: flex">
        <button mat-icon-button (click)="alert('delete')" id="delete">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button><mat-icon>edit_document</mat-icon></button>
      </div>
    </td>
  </ng-container>

  <!-- Header and Row Declarations -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">
      No data matching the filter "{{ input.value }}"
    </td>
  </tr>
</table>
<h2 class="sub-heading">Statistics</h2>
<div class="invoice-statistics">
  <mat-list>
    <mat-list-item>
      <mat-icon matListItemIcon>library_books</mat-icon>
      <h2 matListItemTitle>Total Invoices:</h2>
      <h2 matListItemLine>{{ invoicesLength }}</h2>
    </mat-list-item>
    <mat-list-item>
      <mat-icon matListItemIcon>access_time</mat-icon>
      <h2 matListItemTitle>Most Recent:</h2>
      <h2 matListItemLine>{{ recentInvoice }}</h2>
    </mat-list-item>
  </mat-list>
  <div class="chart-container">
    <canvas
      baseChart
      [data]="pieChartData()"
      [type]="pieChartType"
      [options]="pieChartOptions"
    >
    </canvas>
  </div>
</div>
<mat-divider></mat-divider>
