<h1>My Invoices</h1>
<div class="card-container">
  <div class="card-wrapper" *ngFor="let invoice of invoices; let index = index">
  <mat-card appearance="outlined" class="invoice-card" 
    (click)="navigateToPage('account/' + (index + 1))">
    <mat-card-header>
      <mat-card-title>{{ invoice.name }}</mat-card-title>
    </mat-card-header>
    <mat-icon class="card-icon" matListItemIcon>article</mat-icon>
    <mat-card-content>
      <p>{{ invoice.updated | date }}</p>
    </mat-card-content>
  </mat-card>
  <div class="card-buttons">
      <button mat-icon-button class="button-container" id="delete"><mat-icon>delete</mat-icon></button>
      <button mat-icon-button class="button-container"><mat-icon>edit_document</mat-icon></button>
  </div>
</div>
